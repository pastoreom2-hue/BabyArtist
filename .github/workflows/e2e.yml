name: E2E Autotest

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which E2E suite to run'
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full

jobs:
  playwright:
    name: Playwright (${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'smoke' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E (fast path)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.suite == 'smoke' }}
        run: npm run test:auto:smoke
        env:
          CI: true

      - name: Run full E2E (pre-deploy)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.suite == 'full' }}
        run: npm run test:auto:full
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
